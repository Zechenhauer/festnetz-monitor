name: Log Last Call

on:
  repository_dispatch:
    types: [new_call]

jobs:
  append_call:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Append Call to JSON
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          if [ ! -f calls.json ]; then echo "[]" > calls.json; fi
          
          # Wir lesen die Daten direkt sicher aus der Umgebungsvariable
          jq --argjson data "$PAYLOAD" \
            '. = [{"name": $data.name, "number": $data.number, "duration": $data.duration, "type": $data.type, "timestamp": $data.timestamp}] + .' \
            calls.json > temp.json && mv temp.json calls.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "Home Assistant"
          git config --global user.email "ha@local.home"
          git add calls.json
          # Falls der Name leer ist, nutzen wir einen Fallback im Commit-Text
          NAME="${{ github.event.client_payload.name }}"
          git commit -m "📞 Neuer Anruf: ${NAME:-Unbekannt}"
          git push
