name: Log Last Call

on:
  repository_dispatch:
    types: [new_call]

jobs:
  append_call:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Append Call to JSON
        env:
          CALL_NAME: ${{ github.event.client_payload.name }}
          CALL_NUM: ${{ github.event.client_payload.number }}
          CALL_DUR: ${{ github.event.client_payload.duration }}
          CALL_TYPE: ${{ github.event.client_payload.type }}
          CALL_TS: ${{ github.event.client_payload.timestamp }}
        run: |
          if [ ! -f calls.json ]; then echo "[]" > calls.json; fi
          
          # jq holt sich die Variablen jetzt direkt aus dem Linux-System (völlig ohne JSON-Konflikte)
          jq --arg name "$CALL_NAME" \
             --arg number "$CALL_NUM" \
             --arg duration "$CALL_DUR" \
             --arg type "$CALL_TYPE" \
             --arg ts "$CALL_TS" \
             '. = [{"name": $name, "number": $number, "duration": $duration, "type": $type, "timestamp": $ts}] + .' \
             calls.json > temp.json && mv temp.json calls.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "Home Assistant"
          git config --global user.email "ha@local.home"
          git add calls.json
          git commit -m "📞 Neuer Anruf registriert"
          git push
